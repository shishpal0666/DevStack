<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A8917" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://lh3.googleusercontent.com data: blob:; connect-src 'self' https://dev-stack-api.vercel.app https://accounts.google.com https://oauth2.googleapis.com; frame-src https://accounts.google.com;" />
    <meta
      name="description"
      content="DevStack - A developer blogging platform to create, share, and discover technical articles. Built with the MERN stack."
    />
    <meta property="og:title" content="DevStack - Developer Blogging Platform" />
    <meta property="og:description" content="Create, share, and discover technical articles on DevStack." />
    <meta property="og:type" content="website" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://accounts.google.com" />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" />

    <!-- Non-render-blocking Google Fonts (only Open Sans — the only one actually used) -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      />
    </noscript>

    <title>DevStack</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
